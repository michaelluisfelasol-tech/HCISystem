<!DOCTYPE html>
<html>
<head>
  <title>Order Management - ClickWise</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #f4f6f9;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }
    .admin-layout {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 375px;
      background: white;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      padding: 30px 0;
    }
    .sidebar-header {
      padding: 30px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
    .sidebar-header .logo {
      font-size: 36px;
      font-weight: bold;
      color: #22c55e;
      text-decoration: none;
    }
    .sidebar-menu {
      list-style: none;
      padding: 0;
      margin: 30px 0 0 0;
    }
    .sidebar-menu li {
      margin: 0;
    }
    .sidebar-menu a {
      display: block;
      padding: 22px 30px;
      color: #555;
      text-decoration: none;
      font-size: 24px;
      transition: all 0.3s ease;
      border-left: 6px solid transparent;
    }
    .sidebar-menu a:hover {
      background: #f8f9fa;
      color: #22c55e;
      border-left-color: #22c55e;
    }
    .sidebar-menu a.active {
      background: #22c55e;
      color: white;
      border-left-color: #22c55e;
    }
    .main-content {
      flex: 1;
      padding: 60px;
    }
    .admin-container {
      max-width: 1800px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.1);
      padding: 60px;
    }
    .admin-header {
      text-align: center;
      margin-bottom: 60px;
    }
    .admin-header h1 {
      color: #333;
      font-size: 54px;
      margin-bottom: 15px;
    }
    .admin-header p {
      color: #666;
      font-size: 27px;
    }
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
    }
    .orders-table th, .orders-table td {
      padding: 22px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .orders-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
      font-size: 24px;
    }
    .orders-table td {
      font-size: 21px;
      color: #555;
    }
    .orders-table tr:hover {
      background: #f8f9fa;
    }
    .status-pending {
      color: #f59e0b;
      font-weight: 500;
    }
    .status-processing {
      color: #3b82f6;
      font-weight: 500;
    }
    .status-completed {
      color: #22c55e;
      font-weight: 500;
    }
    .status-cancelled {
      color: #dc2626;
      font-weight: 500;
    }
    .action-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-size: 21px;
      font-weight: 500;
      transition: all 0.2s ease;
      margin-right: 12px;
    }
    .action-btn.view {
      background: #22c55e;
      color: white;
    }
    .action-btn.view:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }
    .action-btn.update {
      background: #3b82f6;
      color: white;
    }
    .action-btn.update:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <a href="startup.html" class="logo">ClickWise</a>
    </div>
    <ul class="sidebar-menu">
      <li><a href="admin.html">Dashboard</a></li>
      <li><a href="admin-users.html">Users</a></li>
      <li><a href="admin-products.html">Products</a></li>
      <li><a href="admin-orders.html" class="active">Orders</a></li>
    </ul>
  </div>

  <div class="main-content">
    <div class="admin-container">
      <div class="admin-header">
        <h1>Order Management</h1>
        <p>View and manage customer orders</p>
      </div>

      <table class="orders-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Total</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody">
          <!-- Orders will be populated here -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  // Simulated order data
  const orders = [
    { id: 'ORD-001', customer: 'John Doe', items: 'Burger, Fries', total: 200, status: 'completed', date: '2024-05-15' },
    { id: 'ORD-002', customer: 'Jane Smith', items: 'Pizza, Coke', total: 280, status: 'processing', date: '2024-05-14' },
    { id: 'ORD-003', customer: 'Bob Johnson', items: 'Chicken, Salad', total: 180, status: 'pending', date: '2024-05-13' },
    { id: 'ORD-004', customer: 'Alice Brown', items: 'Hotdog, Fries', total: 170, status: 'cancelled', date: '2024-05-12' },
    { id: 'ORD-005', customer: 'Charlie Wilson', items: 'Pizza, Garlic Bread', total: 320, status: 'completed', date: '2024-05-11' }
  ];

  // Populate orders table
  function populateOrdersTable() {
    const tbody = document.getElementById('ordersTableBody');
    tbody.innerHTML = '';

    orders.forEach(order => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${order.id}</td>
        <td>${order.customer}</td>
        <td>${order.items}</td>
        <td>₱${order.total}</td>
        <td><span class="status-${order.status}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span></td>
        <td>${order.date}</td>
        <td>
          <button class="action-btn view" onclick="viewOrder('${order.id}')">View</button>
          <button class="action-btn update" onclick="updateOrder('${order.id}')">Update</button>
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  // View order (placeholder)
  function viewOrder(id) {
    alert(`View order details for: ${id}`);
  }

  // Update order (placeholder)
  function updateOrder(id) {
    alert(`Update order status for: ${id}`);
  }

  // Initialize
  populateOrdersTable();
</script>
</body>
</html>
