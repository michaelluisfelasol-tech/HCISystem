<!DOCTYPE html>
<html>
<head>
  <title>Login - ClickWise</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
    }
    .logo-center {
      text-align: center;
      padding: 40px 0;
      font-size: 48px;
      font-weight: bold;
      color: #22c55e;
      text-decoration: none;
    }
    .login-container {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-size: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }
    .form-group input {
      width: 100%;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
    }
    .login-btn {
      width: 100%;
      padding: 18px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }
    .login-btn:hover {
      background: #16a34a;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
    }
    .register-link {
      text-align: center;
      margin-top: 20px;
    }
    .register-link a {
      color: #22c55e;
      text-decoration: none;
      font-weight: 500;
    }
    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<a href="startup.html" class="logo-center">ClickWise</a>

<div class="login-container">
  <h2>Login</h2>
  <form id="loginForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password">
    </div>
    <button type="submit" class="login-btn">Login</button>
  </form>
  <div class="register-link">
    <p>Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</div>

<script src="script.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    // Always redirect to index.html
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
