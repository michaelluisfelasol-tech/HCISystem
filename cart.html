<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="updateCartUI()">

<div class="navbar">
  <div class="nav-left">
    <a href="startup.html" class="logo">ClickWise</a>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="startup.html#about">About Us</a>
      <a href="cart.html">Cart</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>

  <div class="nav-right">
    <input placeholder="Search food...">
    <a href="cart.html">🛒</a>
  </div>
</div>

<h2 style="padding:20px;">Your Cart</h2>

<div id="emptyMessage" style="text-align:center; padding:40px; font-size:18px; color:#999;">
  Your cart is empty. <a href="index.html">Continue shopping</a>
</div>

<div id="cartContainer" style="display:none;">
  <div class="grid" id="cartList" style="padding:20px; gap:20px; flex-wrap:wrap; overflow:visible;"></div>
</div>

<div id="checkoutSection" style="display:none; position:fixed; bottom:20px; right:20px; padding:20px; display:flex; flex-direction:column; align-items:flex-end;">
  <h3 style="font-size: 30px; margin-bottom: -1px; margin-right: 110px;">Total: ₱<span id="total">0</span></h3>
  <button onclick="window.location.href='checkout.html'" style="padding:20px 40px; background:#22c55e; color:white; border:none; border-radius:8px; cursor:pointer; font-size:20px;">Proceed to Checkout</button>
</div>

<script src="script.js"></script>
</body>
</html>
