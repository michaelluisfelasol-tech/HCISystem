<!DOCTYPE html>
<html>
<head>
  <title>Product Management - ClickWise</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #f4f6f9;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }
    .admin-layout {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 375px;
      background: white;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      padding: 30px 0;
    }
    .sidebar-header {
      padding: 30px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
    .sidebar-header .logo {
      font-size: 36px;
      font-weight: bold;
      color: #22c55e;
      text-decoration: none;
    }
    .sidebar-menu {
      list-style: none;
      padding: 0;
      margin: 30px 0 0 0;
    }
    .sidebar-menu li {
      margin: 0;
    }
    .sidebar-menu a {
      display: block;
      padding: 22px 30px;
      color: #555;
      text-decoration: none;
      font-size: 24px;
      transition: all 0.3s ease;
      border-left: 6px solid transparent;
    }
    .sidebar-menu a:hover {
      background: #f8f9fa;
      color: #22c55e;
      border-left-color: #22c55e;
    }
    .sidebar-menu a.active {
      background: #22c55e;
      color: white;
      border-left-color: #22c55e;
    }
    .main-content {
      flex: 1;
      padding: 60px;
    }
    .admin-container {
      max-width: 1800px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.1);
      padding: 60px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
    }
    .admin-header h1 {
      color: #333;
      font-size: 54px;
      margin: 0;
    }
    .add-btn {
      padding: 18px 36px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 24px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .add-btn:hover {
      background: #16a34a;
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(34, 197, 94, 0.3);
    }
    .products-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
    }
    .products-table th, .products-table td {
      padding: 22px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .products-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
      font-size: 24px;
    }
    .products-table td {
      font-size: 21px;
      color: #555;
    }
    .products-table tr:hover {
      background: #f8f9fa;
    }
    .product-image {
      width: 90px;
      height: 90px;
      border-radius: 12px;
      object-fit: cover;
    }
    .action-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-size: 21px;
      font-weight: 500;
      transition: all 0.2s ease;
      margin-right: 12px;
    }
    .action-btn.edit {
      background: #3b82f6;
      color: white;
    }
    .action-btn.edit:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
    .action-btn.delete {
      background: #dc2626;
      color: white;
    }
    .action-btn.delete:hover {
      background: #b91c1c;
      transform: translateY(-2px);
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    .modal-content {
      background-color: white;
      margin: 7.5% auto;
      padding: 45px;
      border-radius: 18px;
      width: 90%;
      max-width: 750px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .modal-header h2 {
      margin: 0;
      color: #333;
      font-size: 36px;
    }
    .close {
      color: #aaa;
      font-size: 42px;
      font-weight: bold;
      cursor: pointer;
    }
    .close:hover {
      color: #333;
    }
    .form-group {
      margin-bottom: 30px;
    }
    .form-group label {
      display: block;
      margin-bottom: 12px;
      font-weight: 500;
      color: #555;
      font-size: 21px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 18px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 21px;
      box-sizing: border-box;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }
    .modal-actions {
      text-align: right;
      margin-top: 45px;
    }
    .modal-actions button {
      padding: 18px 36px;
      border: none;
      border-radius: 12px;
      font-size: 24px;
      font-weight: 600;
      cursor: pointer;
      margin-left: 15px;
      transition: all 0.3s ease;
    }
    .modal-actions .cancel-btn {
      background: #f0f0f0;
      color: #333;
    }
    .modal-actions .cancel-btn:hover {
      background: #e0e0e0;
    }
    .modal-actions .save-btn {
      background: #22c55e;
      color: white;
    }
    .modal-actions .save-btn:hover {
      background: #16a34a;
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(34, 197, 94, 0.3);
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <a href="startup.html" class="logo">ClickWise</a>
    </div>
    <ul class="sidebar-menu">
      <li><a href="admin.html">Dashboard</a></li>
      <li><a href="admin-users.html">Users</a></li>
      <li><a href="admin-products.html" class="active">Products</a></li>
      <li><a href="admin-orders.html">Orders</a></li>
    </ul>
  </div>

  <div class="main-content">
    <div class="admin-container">
      <div class="admin-header">
        <h1>Product Management</h1>
        <button class="add-btn" onclick="openAddModal()">Add New Product</button>
      </div>

      <table class="products-table">
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productsTableBody">
          <!-- Products will be populated here -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add/Edit Product Modal -->
<div id="productModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Add New Product</h2>
      <span class="close" onclick="closeModal()">&times;</span>
    </div>
    <form id="productForm">
      <div class="form-group">
        <label for="productName">Product Name</label>
        <input type="text" id="productName" name="productName" required>
      </div>
      <div class="form-group">
        <label for="productPrice">Price (₱)</label>
        <input type="number" id="productPrice" name="productPrice" step="0.01" required>
      </div>
      <div class="form-group">
        <label for="productCategory">Category</label>
        <input type="text" id="productCategory" name="productCategory" required>
      </div>
      <div class="form-group">
        <label for="productImage">Image URL</label>
        <input type="url" id="productImage" name="productImage" placeholder="https://via.placeholder.com/300">
      </div>
      <div class="form-group">
        <label for="productDescription">Description</label>
        <textarea id="productDescription" name="productDescription"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button type="submit" class="save-btn">Save Product</button>
      </div>
    </form>
  </div>
</div>

<script src="script.js"></script>
<script>
  // Simulated product data
  let products = [
    { id: 1, name: 'Burger', price: 120, category: 'Fast Food', image: 'https://via.placeholder.com/300', status: 'active' },
    { id: 2, name: 'Pizza', price: 250, category: 'Italian', image: 'https://via.placeholder.com/300', status: 'active' },
    { id: 3, name: 'Fries', price: 80, category: 'Sides', image: 'https://via.placeholder.com/300', status: 'active' },
    { id: 4, name: 'Chicken', price: 150, category: 'Main Course', image: 'https://via.placeholder.com/300', status: 'active' },
    { id: 5, name: 'Hotdog', price: 90, category: 'Fast Food', image: 'https://via.placeholder.com/300', status: 'inactive' }
  ];

  let editingProductId = null;

  // Populate products table
  function populateProductsTable() {
    const tbody = document.getElementById('productsTableBody');
    tbody.innerHTML = '';

    products.forEach(product => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td><img src="${product.image}" alt="${product.name}" class="product-image"></td>
        <td>${product.name}</td>
        <td>₱${product.price}</td>
        <td>${product.category}</td>
        <td><span class="status-${product.status}">${product.status.charAt(0).toUpperCase() + product.status.slice(1)}</span></td>
        <td>
          <button class="action-btn edit" onclick="editProduct(${product.id})">Edit</button>
          <button class="action-btn delete" onclick="deleteProduct(${product.id})">Delete</button>
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  // Open add modal
  function openAddModal() {
    editingProductId = null;
    document.getElementById('modalTitle').textContent = 'Add New Product';
    document.getElementById('productForm').reset();
    document.getElementById('productModal').style.display = 'block';
  }

  // Edit product
  function editProduct(id) {
    const product = products.find(p => p.id === id);
    if (product) {
      editingProductId = id;
      document.getElementById('modalTitle').textContent = 'Edit Product';
      document.getElementById('productName').value = product.name;
      document.getElementById('productPrice').value = product.price;
      document.getElementById('productCategory').value = product.category;
      document.getElementById('productImage').value = product.image;
      document.getElementById('productDescription').value = product.description || '';
      document.getElementById('productModal').style.display = 'block';
    }
  }

  // Delete product
  function deleteProduct(id) {
    if (confirm('Are you sure you want to delete this product?')) {
      products = products.filter(p => p.id !== id);
      populateProductsTable();
    }
  }

  // Close modal
  function closeModal() {
    document.getElementById('productModal').style.display = 'none';
    editingProductId = null;
  }

  // Handle form submission
  document.getElementById('productForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const productData = {
      name: document.getElementById('productName').value,
      price: parseFloat(document.getElementById('productPrice').value),
      category: document.getElementById('productCategory').value,
      image: document.getElementById('productImage').value || 'https://via.placeholder.com/300',
      description: document.getElementById('productDescription').value,
      status: 'active'
    };

    if (editingProductId) {
      // Update existing product
      const index = products.findIndex(p => p.id === editingProductId);
      if (index > -1) {
        products[index] = { ...products[index], ...productData };
      }
    } else {
      // Add new product
      const newId = Math.max(...products.map(p => p.id)) + 1;
      products.push({ id: newId, ...productData });
    }

    populateProductsTable();
    closeModal();
  });

  // Close modal when clicking outside
  window.onclick = function(event) {
    const modal = document.getElementById('productModal');
    if (event.target === modal) {
      closeModal();
    }
  };

  // Initialize
  populateProductsTable();
</script>
</body>
</html>
