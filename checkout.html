<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <a href="startup.html" class="logo">ClickWise</a>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="startup.html#about">About Us</a>
      <a href="cart.html">Cart</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>

  <div class="nav-right">
    <input placeholder="Search food...">
    <a href="cart.html">🛒</a>
  </div>
</div>

<!-- Error Notification Modal -->
<div id="errorModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:40px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.3); z-index:1000; max-width:500px; text-align:center;">
  <h2 style="font-size:28px; color:#dc2626; margin:0 0 20px 0;">⚠ Missing Information</h2>
  <p id="errorMessage" style="font-size:20px; color:#666; margin:0 0 30px 0;">Please fill in all required fields</p>
  <button onclick="closeErrorModal()" style="padding:15px 40px; background:#22c55e; color:white; border:none; border-radius:8px; cursor:pointer; font-size:18px; font-weight:bold;">OK</button>
</div>
<div id="errorOverlay" onclick="closeErrorModal()" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:999;"></div>

<div style="padding:40px; max-width:900px; margin:0 auto;">
  <h1 style="font-size:48px; margin-bottom:40px;">Order Summary</h1>

  <!-- Order Items -->
  <div id="orderItems" style="background:#f9f9f9; padding:30px; border-radius:12px; margin-bottom:40px;">
    <h2 style="font-size:32px; margin-bottom:30px;">Items in Your Order</h2>
    <div id="orderList" style="margin-bottom:30px;"></div>
    <div style="background:white; padding:20px; border-radius:8px; text-align:right;">
      <h2 style="font-size:36px; color:#22c55e;">Total: ₱<span id="checkoutTotal">0</span></h2>
    </div>
  </div>

  <!-- Checkout Form -->
  <div style="background:#f9f9f9; padding:30px; border-radius:12px; margin-bottom:40px;">
    <h2 style="font-size:32px; margin-bottom:30px;">Delivery Information</h2>
    
    <div style="margin-bottom:25px;">
      <label style="display:block; font-size:18px; margin-bottom:12px; font-weight:bold;">Full Name</label>
      <input id="fullName" placeholder="Enter your full name" style="width:100%; padding:16px; font-size:18px; border:2px solid #ddd; border-radius:8px; box-sizing:border-box;">
    </div>

    <div style="margin-bottom:25px;">
      <label style="display:block; font-size:18px; margin-bottom:12px; font-weight:bold;">Email</label>
      <input id="email" type="email" placeholder="Enter your email" style="width:100%; padding:16px; font-size:18px; border:2px solid #ddd; border-radius:8px; box-sizing:border-box;">
    </div>

    <div style="margin-bottom:25px;">
      <label style="display:block; font-size:18px; margin-bottom:12px; font-weight:bold;">Phone Number</label>
      <input id="phone" type="tel" placeholder="Enter your phone number" style="width:100%; padding:16px; font-size:18px; border:2px solid #ddd; border-radius:8px; box-sizing:border-box;">
    </div>

    <div style="margin-bottom:25px;">
      <label style="display:block; font-size:18px; margin-bottom:12px; font-weight:bold;">Address</label>
      <textarea id="address" placeholder="Enter your delivery address" style="width:100%; padding:16px; font-size:18px; border:2px solid #ddd; border-radius:8px; box-sizing:border-box; min-height:120px; font-family:Arial, sans-serif;"></textarea>
    </div>
  </div>

  <!-- Action Buttons -->
  <div style="display:flex; gap:20px; justify-content:center;">
    <button onclick="window.location.href='cart.html'" style="padding:20px 50px; background:#999; color:white; border:none; border-radius:8px; cursor:pointer; font-size:20px; font-weight:bold; min-width:200px;">Back to Cart</button>
    <button onclick="placeOrder()" style="padding:20px 50px; background:#22c55e; color:white; border:none; border-radius:8px; cursor:pointer; font-size:20px; font-weight:bold; min-width:200px;">Place Order</button>
  </div>
</div>

<script src="script.js"></script>
<script>
  displayCheckoutOrder();
</script>
</body>
</html>
