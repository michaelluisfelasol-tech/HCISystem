<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - ClickWise</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #f4f6f9;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }
    .admin-layout {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 375px;
      background: white;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      padding: 30px 0;
    }
    .sidebar-header {
      padding: 30px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
    .sidebar-header .logo {
      font-size: 36px;
      font-weight: bold;
      color: #22c55e;
      text-decoration: none;
    }
    .sidebar-menu {
      list-style: none;
      padding: 0;
      margin: 30px 0 0 0;
    }
    .sidebar-menu li {
      margin: 0;
    }
    .sidebar-menu a {
      display: block;
      padding: 22px 30px;
      color: #555;
      text-decoration: none;
      font-size: 24px;
      transition: all 0.3s ease;
      border-left: 6px solid transparent;
    }
    .sidebar-menu a:hover {
      background: #f8f9fa;
      color: #22c55e;
      border-left-color: #22c55e;
    }
    .sidebar-menu a.active {
      background: #22c55e;
      color: white;
      border-left-color: #22c55e;
    }
    .main-content {
      flex: 1;
      padding: 60px;
    }
    .admin-container {
      max-width: 1800px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.1);
      padding: 60px;
    }
    .admin-header {
      text-align: center;
      margin-bottom: 60px;
    }
    .admin-header h1 {
      color: #333;
      font-size: 54px;
      margin-bottom: 15px;
    }
    .admin-header p {
      color: #666;
      font-size: 27px;
    }
    .users-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
    }
    .users-table th, .users-table td {
      padding: 22px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .users-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
      font-size: 24px;
    }
    .users-table td {
      font-size: 21px;
      color: #555;
    }
    .users-table tr:hover {
      background: #f8f9fa;
    }
    .status-active {
      color: #22c55e;
      font-weight: 500;
    }
    .status-inactive {
      color: #dc2626;
      font-weight: 500;
    }
    .action-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-size: 21px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .action-btn.edit {
      background: #3b82f6;
      color: white;
    }
    .action-btn.edit:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
    .action-btn.delete {
      background: #dc2626;
      color: white;
    }
    .action-btn.delete:hover {
      background: #b91c1c;
      transform: translateY(-2px);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 60px;
    }
    .stat-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      text-align: center;
    }
    .stat-card h3 {
      font-size: 36px;
      color: #22c55e;
      margin: 0 0 7px 0;
    }
    .stat-card p {
      color: #666;
      margin: 0;
      font-size: 21px;
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <a href="startup.html" class="logo">ClickWise</a>
    </div>
    <ul class="sidebar-menu">
      <li><a href="admin.html" class="active">Dashboard</a></li>
      <li><a href="admin-users.html">Users</a></li>
      <li><a href="admin-products.html">Products</a></li>
      <li><a href="admin-orders.html">Orders</a></li>
    </ul>
  </div>

  <div class="main-content">
    <div class="admin-container">
      <div class="admin-header">
        <h1>Admin Dashboard</h1>
        <p>Manage users and system information</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <h3 id="totalUsers">0</h3>
          <p>Total Users</p>
        </div>
        <div class="stat-card">
          <h3 id="activeUsers">0</h3>
          <p>Active Users</p>
        </div>
        <div class="stat-card">
          <h3 id="totalOrders">0</h3>
          <p>Total Orders</p>
        </div>
        <div class="stat-card">
          <h3 id="revenue">₱0</h3>
          <p>Revenue</p>
        </div>
      </div>

      <h2 style="color: #333; margin-bottom: 20px;">Recent Users</h2>
      <table class="users-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
            <th>Join Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <!-- Users will be populated here -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  // Simulated user data
  const users = [
    { id: 1, name: 'John Doe', email: 'john@example.com', status: 'active', joinDate: '2024-01-15' },
    { id: 2, name: 'Jane Smith', email: 'jane@example.com', status: 'active', joinDate: '2024-02-20' },
    { id: 3, name: 'Bob Johnson', email: 'bob@example.com', status: 'inactive', joinDate: '2024-03-10' },
    { id: 4, name: 'Alice Brown', email: 'alice@example.com', status: 'active', joinDate: '2024-04-05' },
    { id: 5, name: 'Charlie Wilson', email: 'charlie@example.com', status: 'active', joinDate: '2024-05-12' }
  ];

  // Populate users table
  function populateUsersTable() {
    const tbody = document.getElementById('usersTableBody');
    tbody.innerHTML = '';

    users.forEach(user => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${user.id}</td>
        <td>${user.name}</td>
        <td>${user.email}</td>
        <td><span class="status-${user.status}">${user.status.charAt(0).toUpperCase() + user.status.slice(1)}</span></td>
        <td>${user.joinDate}</td>
        <td>
          <button class="action-btn edit" onclick="editUser(${user.id})">Edit</button>
          <button class="action-btn delete" onclick="deleteUser(${user.id})">Delete</button>
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  // Update stats
  function updateStats() {
    const totalUsers = users.length;
    const activeUsers = users.filter(u => u.status === 'active').length;
    const totalOrders = Math.floor(Math.random() * 1000) + 500; // Simulated
    const revenue = Math.floor(Math.random() * 50000) + 10000; // Simulated

    document.getElementById('totalUsers').textContent = totalUsers;
    document.getElementById('activeUsers').textContent = activeUsers;
    document.getElementById('totalOrders').textContent = totalOrders;
    document.getElementById('revenue').textContent = '₱' + revenue.toLocaleString();
  }

  // Edit user (placeholder)
  function editUser(id) {
    alert(`Edit user with ID: ${id}`);
  }

  // Delete user (placeholder)
  function deleteUser(id) {
    if (confirm('Are you sure you want to delete this user?')) {
      const index = users.findIndex(u => u.id === id);
      if (index > -1) {
        users.splice(index, 1);
        populateUsersTable();
        updateStats();
      }
    }
  }

  // Initialize
  populateUsersTable();
  updateStats();
</script>
</body>
</html>
